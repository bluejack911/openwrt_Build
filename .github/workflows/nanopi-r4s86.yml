#=================================================
# Description: Build OpenWrt using GitHub Actions (Simplified)
# Author: Collaborative Peer
#=================================================

name: openwrt_x86_fixed

on:
  repository_dispatch:
  workflow_dispatch:

env:
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf /usr/lib/jvm
        sudo df -hT

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget \
        llvm python3-pyelftools libpython3-dev aria2 jq qemu-utils ccache rename \
        libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "Asia/Shanghai"
        
    - name: Clone source code
      env: 
        REPO_URL: https://github.com
        REPO_BRANCH: openwrt-25.12
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "src-git smpackage https://github.com" >> feeds.conf.default

    - name: Update feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Defconfig
      run: |
        # 优先使用你上传到根目录的 ctc_25.12.config
        [ -e ctc_25.12.config ] && cp -f ctc_25.12.config openwrt/.config
        cd openwrt
        
        # 修复 Golang 地址
        rm -rf feeds/packages/lang/golang
        git clone --depth 1 https://github.com -b 1.23 feeds/packages/lang/golang || \
        git clone --depth 1 https://github.com feeds/packages/lang/golang
        
        # 刷新并安装
        ./scripts/feeds update -i && ./scripts/feeds install -a
        make defconfig
        
    - name: Download package
      working-directory: ./openwrt
      run: |
        make download -j$(nproc)
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      working-directory: ./openwrt
      run: |
        echo -e "$(($(nproc)+1)) thread compile"
        make -j$(($(nproc)+1)) || make -j1 V=s      
     
    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        mkdir firmware
        # 只提取 x86 的组合镜像和升级包
        mv -f openwrt/bin/targets/*/*/*combined* ./firmware/ 2>/dev/null || true
        mv -f openwrt/bin/targets/*/*/*sysupgrade* ./firmware/ 2>/dev/null || true
        cp openwrt/.config ./firmware/config.buildinfo
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to Artifact
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_x86_Firmware
        path: ./firmware/
